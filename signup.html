<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up - My-Farm-Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body id="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🌱 My-Farm-Manager</h1>
        <p>Join our farming community! Create your account to get started.</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password (min 6 characters)" required minlength="6">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required minlength="6">
        </div>

        <button type="submit" class="btn btn-full">Create Account</button>
      </form>

      <div class="auth-links">
        <p>Already have an account? <a href="login.html">Sign in here</a></p>
        <p><a href="index.html">← Back to Home</a></p>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      console.log('Signup page loaded, supabase available:', !!window.supabase);

      const form = document.getElementById('signupForm');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!name || !email || !password || !confirmPassword) {
          alert('Please fill in all fields');
          return;
        }

        if (password !== confirmPassword) {
          alert('Passwords do not match');
          return;
        }

        if (password.length < 6) {
          alert('Password must be at least 6 characters long');
          return;
        }

        try {
          console.log('Attempting signup with:', email, name);
          const { data, error } = await window.supabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: {
                name: name
              }
            }
          });

          if (error) throw error;

          console.log('Signup successful, user:', data.user);
          alert('Account created successfully! Please check your email to verify your account, then sign in.');
          window.location.href = 'login.html';
        } catch (error) {
          console.error('Signup error:', error);
          alert('Signup failed: ' + error.message);
        }
      });
    });
  </script>
</body>
</html>
